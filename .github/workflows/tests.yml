# Runs the test suite on push/PR to the gateway repo.
# Catches regressions before they reach callers.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@424c5aa274b8c1e36b106360c6d2c4de4d45d6f6 # v5.3.0
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install --quiet pytest

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
