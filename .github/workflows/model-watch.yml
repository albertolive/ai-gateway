# Runs in the ai-gateway repo itself (not reusable). Every Monday it checks
# whether pinned models are still alive/free, replaces dead ones, and opens
# a PR with a full report — including new free candidates worth promoting.
#
# One-time repo setting required for the bot PR:
#   Settings -> Actions -> General -> Workflow permissions ->
#   check "Allow GitHub Actions to create and approve pull requests".
name: Model Watch

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: model-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false # don't leave creds in git config; we set them explicitly below

      # model-watch needs to push the bot PR branch, so configure git
      # credentials explicitly instead of relying on checkout's persistence.
      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ github.token }}
        run: git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Check model catalogs
        id: check
        env:
          # Optional: set these as repo secrets in ai-gateway to also
          # verify the Gemini and Groq models (skipped otherwise).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/check_models.py --update

      - name: Open or update bot PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "model-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B model-watch/updates
          git add models.json
          git commit -m "chore(models): replace deprecated/no-longer-free models"
          git push -f origin model-watch/updates
          if ! gh pr view model-watch/updates &>/dev/null; then
            gh pr create \
              --title "Model watch: cascade updates" \
              --body-file model_watch_report.md \
              --base main --head model-watch/updates
          else
            gh pr edit model-watch/updates --body-file model_watch_report.md
          fi

      - name: Publish report to run summary
        if: always()
        run: cat model_watch_report.md >> "$GITHUB_STEP_SUMMARY" || true

      # Nothing died (no PR fired) but a new candidate scores well enough to
      # be worth a look — open/update a single tracking issue rather than a
      # new one every week. Stable title so it dedupes; the report itself
      # (see check_models.py) carries the "verify live before promoting"
      # caveat, catalog score is not a correctness check.
      - name: Open or update candidate-review issue
        if: steps.check.outputs.promising_candidate == 'true' && steps.check.outputs.changed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --search 'in:title "Model watch: new candidate worth reviewing"' --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file model_watch_report.md
          else
            gh issue create --title "Model watch: new candidate worth reviewing" --body-file model_watch_report.md
          fi
